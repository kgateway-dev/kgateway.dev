baseURL: "/"
enableRobotsTXT: true
# Derive each page's .Lastmod from its last git commit — no manually maintained
# front-matter dates. Feeds the sitemap <lastmod> for SEO. Listing "lastmod"
# before ":git" keeps an explicit front-matter date ahead of the commit date
# where a page sets one.
enableGitInfo: true
frontmatter:
  lastmod: ["lastmod", ":git", "date", "publishDate"]
canonifyURLs: true
title: "kgateway"

services:
  googleAnalytics:
    ID: "G-9P21XPDJPX"

outputs:
  home: [HTML, RSS, llms]
  page: [HTML, markdown]
  section: [HTML, RSS, markdown, llms]

defaultContentLanguage: en

module:
  imports:
    # hextra used to live here as a sibling import; docs-theme-extras
    # now declares the hextra import itself, so consumers no longer
    # need to list it separately. The shadowing order stays correct:
    # docs-theme-extras's own layouts win over the transitively-imported
    # hextra ones.
    - path: github.com/solo-io/docs-theme-extras
  mounts:
    - source: "assets"
      target: "assets"
    - source: "fonts"
      target: "static/fonts"
    - source: "hugo_stats.json"
      target: "assets/watching/hugo_stats.json"

caches:
  getresource:
    dir: ":cacheDir/:project"
    maxAge: 1h  # Cache remote resources for 1 hour to balance freshness and build speed

build:
  writeStats: true
  cachebusters:
    - source: "assets/watching/hugo_stats\\.json"
      target: "styles\\.css"
    - source: "(postcss|tailwind)\\.config\\.js"
      target: "css"
    - source: "assets/.*\\.(js|ts|jsx|tsx)"
      target: "js"
    - source: "assets/.*\\.(.*)$"
      target: "$1"

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

enableInlineShortcodes: true

menu:
  main:
    - name: Resources
      url: /resources
      weight: 1
    - name: Blog
      url: /blog
      weight: 2
    - name: Search
      weight: 5
      params:
        type: search
    - name: GitHub
      weight: 10
      url: "https://github.com/kgateway-dev/kgateway"
      params:
        icon: github

params:
  description: Kgateway is a feature-rich, fast, and flexible API gateway that is built on top of Envoy proxy and the Kubernetes Gateway API. It excels in function-level routing, supports legacy apps, microservices and serverless, offers robust discovery capabilities, integrates seamlessly with open-source projects, and is designed to support hybrid applications with various technologies, architectures, protocols, and clouds.

  # Default social-share image for OpenGraph / Twitter cards (og:image),
  # emitted by Hextra's opengraph.html and docs-theme-extras' twitter_cards.html.
  # Requires a raster card committed at static/ogimage.png (agw-oss uses a
  # 1280x720 PNG). Until that asset exists this points at a 404 and no card
  # image is shown.
  images:
    - /ogimage.png

  # Tells docs-theme-extras which brand CSS layer + font stack to load
  # (see the module's layouts/partials/themeExtras/head-end.html). "oss"
  # loads brand-oss.css and Open Sans; "enterprise" loads brand-enterprise.css.
  themeExtras:
    brand: oss
    # Canonical production host (scheme + hostname, no trailing slash, no path).
    # Read by the docs-theme-extras module's `utils/prod-host` partial and reused
    # across layouts (copy-markdown, llms.txt, page-to-markdown) that emit
    # absolute URLs which need to resolve when pasted outside the build's
    # preview URL. Set explicitly here because kgw-oss's prod baseURL doesn't
    # include the host.
    prodHost: "https://kgateway.dev"
  navbar:
    displayTitle: false
    displayLogo: true
    logo:
      path: /logo.svg
      dark: /logo-dark.svg
      link: /
      width: 494
      height: 100
    width: wide

  page:
    width: wide

  theme:
    default: light
    displayToggle: true

  footer:
    enable: true
    displayCopyright: true
    displayPoweredBy: false
    width: normal

  # Suppress the visible "Last updated on <date>" footer. Page .Lastmod still
  # feeds the sitemap <lastmod> (SEO); we just don't show the date in the footer.
  displayUpdatedDate: false
  dateFormat: "January 2, 2006"

  # Search
  # flexsearch is enabled by default
  search:
    enable: true
    type: flexsearch

    flexsearch:
      # index page by: content | summary | heading | title
      # `content` indexes the full body keyed by heading anchors, so users
      # can find terms anywhere on a page (not just in the description) and
      # results link directly to the matching section.
      index: content

  editURL:
    enable: false

  feedback:
    enable: true
    issueRepo: kgateway-dev/kgateway.dev

  llms:
    docsIntro: kgateway is a Kubernetes-native Gateway API implementation built on Envoy with AI gateway capabilities.

  blog:
    list:
      displayTags: true

  comments:
    enable: false
    type: giscus

    giscus:
      repo: imfing/hextra
      repoId: 
      category: General
      categoryId: 

  searchbot:
    urls:
      websites: https://searchbot.tryhelix.ai/
      bots: https://searchbot.tryhelix.ai/bots
  
  # Global versions (consumed by local partials 404.html, navbar.html,
  # navbar-version.html, breadcrumb.html as a default before the
  # section-specific list overrides). Keep these in sync with the
  # latest section list below.
  versions:
    - version: "2.5.x"
      dropdown: "main"
      linkVersion: "main"
      url: "/main"
    - version: "2.4.x"
      dropdown: "2.4 (latest)"
      linkVersion: "latest"
      url: "/latest"
    - version: "2.3.x"
      dropdown: "2.3"
      # linkVersion "latest" marks this as the current version, so
      # docs-theme-extras' version-noindex partial keeps only this version
      # indexable and emits noindex on duplicate pages in the others
      # (/main, /2.2.x, /2.1.x).
      linkVersion: "2.3.x"
      url: "/2.3.x"
    - version: "2.2.x"
      dropdown: "2.2"
      linkVersion: "2.2.x"
      url: "/2.2.x"
    - version: "2.1.x"
      dropdown: "2.1"
      linkVersion: "2.1.x"
      url: "/2.1.x"

  # Section-specific configurations
  sections:
    envoy:
      versions:
        - version: "2.5.x"
          dropdown: "main"
          linkVersion: "main"
          url: "/main"
        - version: "2.4.x"
          dropdown: "2.4 (latest)"
          linkVersion: "latest"
          url: "/latest"
        - version: "2.3.x"
          dropdown: "2.3"
          linkVersion: "2.3.x"
          url: "/2.3.x"
        - version: "2.2.x"
          dropdown: "2.2"
          linkVersion: "2.2.x"
          url: "/2.2.x"
        - version: "2.1.x"
          dropdown: "2.1"
          linkVersion: "2.1.x"
          url: "/2.1.x"

    agentgateway:
      # This section has no internal landing page in kgw — the section key
      # exists only so the version dropdown scopes correctly when users land
      # on a shared path like /docs/agentgateway/latest/reference/api/. The
      # centralized sidebar's section-chip row reads `externalURL` and points
      # the chip off-site rather than to a stub /docs/agentgateway/latest/.
      # No `versions:` override here — consumers (navbar, navbar-version,
      # extras sidebar) fall back to the top-level `params.versions` list.
      externalURL: "https://agentgateway.dev/docs/kubernetes/latest/"
